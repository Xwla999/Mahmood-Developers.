<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mahmood Developer • Full Stack Developer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
display:flex;
justify-content:center;
align-items:center;
}

body{

background:
radial-gradient(circle at center,#001a10 0%,#000 70%);

}

canvas{
position:fixed;
inset:0;
z-index:0;
}

h1{

position:relative;
z-index:2;

font-size:10vw;
font-weight:900;

text-transform:uppercase;

color:#00ff99;

text-align:center;

text-shadow:
0 0 10px #00ff99,
0 0 30px #00ff99,
0 0 60px #00ff99,
0 0 100px #00ff99;

animation:
zoom 5s linear forwards,
glow 2s infinite alternate;

}

h1::before,
h1::after{

content:attr(data-text);

position:absolute;

left:0;

top:0;

width:100%;
height:100%;

}

h1::before{

color:#ff0040;

left:-3px;

animation:glitch1 .25s infinite;

}

h1::after{

color:#00ffff;

left:3px;

animation:glitch2 .3s infinite;

}

@keyframes glow{

from{

opacity:.7;

}

to{

opacity:1;

}

}

@keyframes zoom{

from{

transform:scale(.7);

}

to{

transform:scale(1.25);

}

}

@keyframes glitch1{

0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(-3px,-2px);}
60%{transform:translate(3px,1px);}
80%{transform:translate(-1px,-3px);}
100%{transform:translate(0);}

}

@keyframes glitch2{

0%{transform:translate(0);}
20%{transform:translate(3px,-2px);}
40%{transform:translate(2px,2px);}
60%{transform:translate(-2px,2px);}
80%{transform:translate(1px,-2px);}
100%{transform:translate(0);}

}

.fade{

animation:fade 1s forwards;

}

@keyframes fade{

to{

opacity:0;

}

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<h1 data-text="Mahmood DEVELOPER">
Mahmood<br>DEVELOPER
</h1>

<script>

document.body.addEventListener("click",()=>{

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen().catch(()=>{});

}

},{once:true});

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const letters="01";
const size=18;

const columns=Math.floor(canvas.width/size);

const drops=[];

for(let i=0;i<columns;i++){

drops[i]=1;

}

function draw(){

ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff66";
ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*size,drops[i]*size);

if(drops[i]*size>canvas.height&&Math.random()>0.98){

drops[i]=0;

}

drops[i]++;

}

}

setInterval(draw,35);

setTimeout(()=>{

document.querySelector("h1").classList.add("fade");

},5000);

</script>

</body>
</html>
